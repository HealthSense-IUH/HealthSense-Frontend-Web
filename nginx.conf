server {
    listen 80;
    server_name localhost;

    # Nén Gzip để load trang nhanh hơn
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Root directory nơi Nginx phục vụ file build
    root /usr/share/nginx/html;
    index index.html;

    # Cấu hình chính cho SPA (React Router)
    location / {
        # Bất kỳ URL nào không phải file vật lý, đều fallback về index.html
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (images, css, js) để tăng hiệu năng
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Bỏ qua access log cho health check nếu có
    location = /health {
        access_log off;
        return 200 'healthy\n';
    }
}
